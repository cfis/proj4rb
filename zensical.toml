[project]

site_name = "proj4rb"
site_description = "Ruby bindings for the Proj coordinate transformation library"
site_url = "https://cfis.github.io/proj4rb/"

repo_name = "cfis/proj4rb"
repo_url = "https://github.com/cfis/proj4rb"

nav = [
  { "Home" = "index.md" },
  { "Concepts" = [
    { "CRS" = "crs.md" },
    { "Coordinate Operations" = "coordinate_operations.md" },
    { "Geodetic Objects" = "geodetic_objects.md" },
    { "Grids" = "grids.md" },
  ] },
  { "Library" = [
    { "Configuration" = "configuration.md" },
    { "Contexts" = "contexts.md" },
    { "Database" = "database.md" },
    { "Serialization" = "serialization.md" },
    { "Class Hierarchy" = "class_hierarchy.md" },
  ] },
  { "How-To Guides" = [
    { "Overview" = "examples.md" },
    { "Geodetic to Projected" = "examples/geodetic_to_projected.md" },
    { "Axis Order" = "examples/axis_order_normalization.md" },
    { "Area of Interest" = "examples/transformation_with_area.md" },
    { "Operation Factory" = "examples/operation_factory_context.md" },
    { "Pipeline Operator" = "examples/pipeline_operator.md" },
    { "Batch Transformation" = "examples/batch_transformation.md" },
    { "Geodesic Distance" = "examples/geodetic_distance.md" },
    { "Transform Bounds" = "examples/transform_bounds.md" },
    { "CRS Identification" = "examples/crs_identification.md" },
    { "Promote & Demote 3D" = "examples/promote_demote_3d.md" },
    { "Database Querying" = "examples/database_query.md" },
    { "Serialization" = "examples/serialization_formats.md" },
    { "Context Logging" = "examples/context_logging.md" },
  ] },
  { "Development" = [
    { "ruby-bindgen / FFI" = "ruby_bindgen.md" },
  ] },
  { "Changelog" = "changelog.md" },
  { "API Reference" = "reference/" },
]

[project.theme]

variant = "classic"

features = [
  "navigation.top",
  "search.highlight",
  "content.code.copy",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]

[project.markdown_extensions.tables]

[project.markdown_extensions.pymdownx.highlight]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
