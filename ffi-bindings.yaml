  overrides:
    # Output buffer: char *s is caller-allocated, function writes into it and returns same pointer
    proj_rtodms2: "[:pointer, :ulong, :double, :int, :int], :pointer"
    # Return must be :pointer so caller can free via proj_string_destroy
    proj_suggests_code_for: "[:pointer, :pointer, :string, :int, :pointer], :pointer"
    # Takes a pointer to free, not an input string
    proj_string_destroy: "[:pointer], :void"
    # Bool returns: C returns int 0/1, but Ruby 0 is truthy so must use :bool
    proj_is_crs: "[:pointer], :bool"
    proj_get_area_of_use: "[:pointer, :pointer, :pointer, :pointer, :pointer, :pointer, :pointer], :bool"
    proj_get_area_of_use_ex: "[:pointer, :pointer, :int, :pointer, :pointer, :pointer, :pointer, :pointer], :bool"
    proj_cs_get_axis_info: "[:pointer, :pointer, :int, :pointer, :pointer, :pointer, :pointer, :pointer, :pointer, :pointer], :bool"
    # size_t vs ulong: on 64-bit Windows size_t is 8 bytes but ulong is 4 bytes
    proj_trans_generic: "[:pointer, PjDirection, :pointer, :size_t, :size_t, :pointer, :size_t, :size_t, :pointer, :size_t, :size_t, :pointer, :size_t, :size_t], :size_t"
    proj_trans_array: "[:pointer, PjDirection, :size_t, :pointer], :int"
    # Struct array parameters: C takes int count + Struct* array, not a single struct by reference
    proj_create_cs: "[:pointer, PjCoordinateSystemType, :int, :pointer], :pointer"
    proj_create_conversion: "[:pointer, :string, :string, :string, :string, :string, :string, :int, :pointer], :pointer"
    proj_create_transformation: "[:pointer, :string, :string, :string, :pointer, :pointer, :pointer, :string, :string, :string, :int, :pointer, :double], :pointer"
    # Linked list returns: C returns pointer to null-terminated array of structs
    proj_list_operations: "[], :pointer"
    proj_list_ellps: "[], :pointer"
    proj_list_prime_meridians: "[], :pointer"

clang:
  args:
    - "-I/usr/lib/clang/21/include"
